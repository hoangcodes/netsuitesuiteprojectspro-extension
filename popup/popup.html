<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timesheet Importer</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="../features/appearance/appearance.css">
</head>
<body>
<div class="popup-wrap">

  <!-- Header (always visible) -->
  <div class="header">
    <div class="header-left">
      <span class="header-title">Timesheet Importer</span>
    </div>
    <div class="header-right">
      <span id="statusDot" class="status-dot"></span>
      <span id="statusLabel" class="status-label">detecting&hellip;</span>
    </div>
  </div>

  <!-- View: Main -->
  <div id="v-main" class="view is-active">
    <div class="sections">

      <div class="section-group">
        <div class="group-label">Resources</div>
        <button class="nav-item" id="downloadExampleBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
          <span>Download example</span>
        </button>
        <button class="nav-item" id="downloadBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Download template</span>
        </button>
      </div>

      <div class="section-group">
        <div class="group-label">Appearance</div>
        <div id="oai-appearance-widget"></div>
      </div>

      <div class="section-group">
        <div class="group-label">Community</div>
        <a class="nav-item" href="https://github.com/hoangcodes/openair-timesheet-helper" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span>Leave a review</span>
        </a>
<!-- Report a bug - temporarily hidden, restore later
        <a class="nav-item" href="https://github.com/hoangcodes/openair-timesheet-helper/issues" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6l4-4 4 4"/><path d="M2 9h20"/><path d="M12 2v4"/><rect x="6" y="9" width="12" height="12" rx="2"/><path d="M6 15H2"/><path d="M22 15h-4"/><path d="M6 19H2"/><path d="M22 19h-4"/></svg>
          <span>Report a bug</span>
        </a>
        -->
        <button class="nav-item" id="copyEmailBtn" title="Copy q.hoang@connorgp.com to clipboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <span>Email the developer</span>
        </button>
      </div>

    </div>
    <div class="footer">
      <span class="footer-dev-label">developed by q hoang</span>
      <a class="footer-github" href="https://github.com/hoangcodes/openair-timesheet-helper" target="_blank" rel="noopener" title="View on GitHub">

      </a>
    </div>
  </div><!-- /.popup-wrap -->

  <script src="../features/appearance/appearance.js"></script>
  <script src="popup.js"></script>
</body>
</html>
